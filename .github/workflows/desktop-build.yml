name: lazytest-desktop-build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Install desktop build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Unit tests
        run: go test ./...
      - name: Build desktop binary
        run: go build -tags desktop -o bin/lazytest-desktop ./cmd/lazytest-desktop
